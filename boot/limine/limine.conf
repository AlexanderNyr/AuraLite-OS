# limine.conf — NovOS boot configuration.
#
# Limine scans the boot media for this file under /boot/limine/, /boot/, or /.
# `serial: yes` mirrors the Limine terminal to COM1 (visible via `-serial stdio`).
# `verbose: yes` emits detailed load logs, useful during bring-up.

timeout: 0
serial: yes
verbose: no

/NovOS
    protocol: limine
    kernel_path: boot():/boot/kernel.elf
    kernel_cmdline: novos debug
