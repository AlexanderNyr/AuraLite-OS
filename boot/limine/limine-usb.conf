# limine-usb.conf — boot config for USB/HDD boot.
#
# Uses the `boot()` function to reference the boot partition, which works
# for both BIOS HDD and USB boot. The kernel and initrd are on the same
# FAT32 partition.

timeout: 0
serial: yes
verbose: no

/AuraLite
    protocol: limine
    kernel_path: boot():/boot/kernel.elf
    module_path: boot():/boot/initrd.tar
    kernel_cmdline: auralite debug
